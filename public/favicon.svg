<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="45%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#e06a1f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#171310"/>

  <!-- firebreak grid -->
  <g stroke="#3b3325" stroke-width="6">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- burnt cells -->
  <g fill="#2c2519">
    <rect x="0" y="0" width="128" height="128"/>
    <rect x="128" y="0" width="128" height="128"/>
    <rect x="0" y="128" width="128" height="128"/>
    <rect x="384" y="384" width="128" height="128"/>
    <rect x="384" y="256" width="128" height="128"/>
    <rect x="256" y="384" width="128" height="128"/>
  </g>

  <!-- firebreak (dashed break line) -->
  <g stroke="#6e6146" stroke-width="10" stroke-dasharray="4 10" stroke-linecap="round">
    <line x1="256" y1="0" x2="256" y2="512"/>
  </g>

  <!-- spark glow -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- spark core -->
  <circle cx="256" cy="256" r="54" fill="#ffd86b"/>
  <circle cx="256" cy="256" r="54" fill="none" stroke="#ff8a3d" stroke-width="8"/>
</svg>
